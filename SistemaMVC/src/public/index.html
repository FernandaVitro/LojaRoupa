<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Sistema de Gestão</title>

    <!-- Material-UI v5 -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@mui/material@5.15.15/umd/material-ui.development.js"></script>
    <script src="https://unpkg.com/@emotion/react@11.11.3/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11.11.0/dist/emotion-styled.umd.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', 'Roboto', sans-serif !important;
            background: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 100%);
            min-height: 100vh;
            color: #4c0519;
            margin: 0;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
            box-shadow: 0 20px 25px -5px rgba(225, 29, 72, 0.05), 0 10px 10px -5px rgba(225, 29, 72, 0.04) !important;
        }

        .btn-pink-gradient {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%) !important;
            transition: all 0.3s ease !important;
        }

        .btn-pink-gradient:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 10px 20px -3px rgba(225, 29, 72, 0.3) !important;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #ffe4e6;
        }

        ::-webkit-scrollbar-thumb {
            background: #fda4af;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, useCallback } = React;

        const {
            Box,
            Button,
            TextField,
            Typography,
            Paper,
            Table,
            TableBody,
            TableCell,
            TableContainer,
            TableHead,
            TableRow,
            Dialog,
            DialogTitle,
            DialogContent,
            IconButton,
            Grid,
            InputAdornment,
            CircularProgress,
            Alert
        } = MaterialUI;

        const API_URL = 'http://localhost:3000/pessoas';

        const formatarDocumento = (valor) => {

            const numeros = valor.replace(/\D/g, '');

            if (numeros.length <= 11) {

                return numeros
                    .replace(/(\d{3})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d{1,2})$/, '$1-$2');

            } else {

                return numeros
                    .replace(/^(\d{2})(\d)/, '$1.$2')
                    .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
                    .replace(/\.(\d{3})(\d)/, '.$1/$2')
                    .replace(/(\d{4})(\d)/, '$1-$2');
            }
        };

        const SGPForm = () => {

            const [formData, setFormData] = useState({
                pessoa_id: '',
                documento: '',
                nome_razao_social: '',
                nome_social_fantasia: '',
                cep: '',
                endereco: '',
                numero: '',
                bairro: '',
                cidade: '',
                estado: '',
                email: ''
            });

            const [pessoas, setPessoas] = useState([]);
            const [openModal, setOpenModal] = useState(false);
            const [loading, setLoading] = useState(false);
            const [alertMessage, setAlertMessage] = useState('');

            const handleInputChange = (e) => {

                const { id, value } = e.target;

                if (id === 'documento') {

                    setFormData(prev => ({
                        ...prev,
                        documento: formatarDocumento(value)
                    }));

                    return;
                }

                setFormData(prev => ({
                    ...prev,
                    [id]: value
                }));
            };

            const buscarCEP = useCallback(async (cep) => {

                const cepLimpo = cep.replace(/\D/g, "");

                if (cepLimpo.length === 8) {

                    try {

                        const res = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);

                        const data = await res.json();

                        if (!data.erro) {

                            setFormData(prev => ({
                                ...prev,
                                endereco: data.logradouro,
                                bairro: data.bairro,
                                cidade: data.localidade,
                                estado: data.uf
                            }));
                        }

                    } catch (e) {
                        console.log('Erro CEP');
                    }
                }

            }, []);

            const carregarPessoas = useCallback(async () => {

                try {

                    const res = await fetch(API_URL);

                    const data = await res.json();

                    setPessoas(data);

                } catch (e) {
                    console.log('Erro ao carregar');
                }

            }, []);

            const salvar = async () => {

                setLoading(true);
                setAlertMessage('');

                const dados = {
                    ...formData,
                    tipo: 'Fisica'
                };

                try {

                    const metodo = formData.pessoa_id ? 'PUT' : 'POST';

                    const url = formData.pessoa_id
                        ? `${API_URL}/${formData.pessoa_id}`
                        : API_URL;

                    const response = await fetch(url, {
                        method: metodo,
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(dados)
                    });

                    if (response.ok) {

                        setAlertMessage('Cadastro salvo com sucesso!');

                        limparFormulario();

                        if (openModal) {
                            carregarPessoas();
                        }

                    } else {

                        setAlertMessage('Erro ao salvar');
                    }

                } catch (error) {

                    setAlertMessage('Erro servidor');

                } finally {

                    setLoading(false);
                }
            };

            const editarPessoa = (pessoa) => {

                setFormData(pessoa);

                setOpenModal(false);
            };

            const deletarPessoa = async (id) => {

                if (!window.confirm('Deseja excluir?')) return;

                await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                carregarPessoas();
            };

            const limparFormulario = () => {

                setFormData({
                    pessoa_id: '',
                    documento: '',
                    nome_razao_social: '',
                    nome_social_fantasia: '',
                    cep: '',
                    endereco: '',
                    numero: '',
                    bairro: '',
                    cidade: '',
                    estado: '',
                    email: ''
                });
            };

            useEffect(() => {

                if (formData.cep) {

                    const timeoutId = setTimeout(() => {
                        buscarCEP(formData.cep);
                    }, 500);

                    return () => clearTimeout(timeoutId);
                }

            }, [formData.cep, buscarCEP]);

            return (

                <Box sx={{ maxWidth: 1200, mx: 'auto', mt: 4 }}>

                    <Box sx={{
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        mb: 5,
                        flexWrap: 'wrap',
                        gap: 2
                    }}>

                        <Box>

                            <Typography
                                variant="h3"
                                sx={{
                                    fontWeight: 800,
                                    color: '#9B1C3B'
                                }}
                            >
                                Sistema de Gestão
                            </Typography>

                            <Typography sx={{
                                color: '#FB7185'
                            }}>
                                Cadastro de Pessoas
                            </Typography>

                        </Box>

                        <Box sx={{
                            display: 'flex',
                            gap: 2,
                            flexWrap: 'wrap'
                        }}>

                            <Button
                                variant="contained"
                                href="./produto.html"
                                sx={{
                                    backgroundColor: '#EC4899',
                                    borderRadius: 3,
                                    fontWeight: 700,
                                    textTransform: 'none',
                                    '&:hover': {
                                        backgroundColor: '#BE185D'
                                    }
                                }}
                            >
                                Ir para Produto
                            </Button>

                            <Button
                                variant="outlined"
                                startIcon={<i className="material-icons">search</i>}
                                onClick={() => {
                                    setOpenModal(true);
                                    carregarPessoas();
                                }}
                            >
                                Consultar
                            </Button>

                            <Button
                                variant="contained"
                                onClick={limparFormulario}
                            >
                                Limpar
                            </Button>

                        </Box>

                    </Box>

                    {alertMessage && (
                        <Alert sx={{ mb: 3 }}>
                            {alertMessage}
                        </Alert>
                    )}

                    <Paper className="glass-card" sx={{
                        p: 5,
                        borderRadius: 8
                    }}>

                        <Grid container spacing={3}>

                            <Grid item xs={12} md={4}>
                                <TextField
                                    fullWidth
                                    id="documento"
                                    label="CPF / CNPJ"
                                    value={formData.documento}
                                    onChange={handleInputChange}
                                />
                            </Grid>

                            <Grid item xs={12} md={8}>
                                <TextField
                                    fullWidth
                                    id="nome_razao_social"
                                    label="Nome Completo"
                                    value={formData.nome_razao_social}
                                    onChange={handleInputChange}
                                />
                            </Grid>

                            <Grid item xs={12}>
                                <TextField
                                    fullWidth
                                    id="nome_social_fantasia"
                                    label="Nome Social"
                                    value={formData.nome_social_fantasia}
                                    onChange={handleInputChange}
                                />
                            </Grid>

                            <Grid item xs={12} md={3}>
                                <TextField
                                    fullWidth
                                    id="cep"
                                    label="CEP"
                                    value={formData.cep}
                                    onChange={handleInputChange}
                                />
                            </Grid>

                            <Grid item xs={12} md={7}>
                                <TextField
                                    fullWidth
                                    id="endereco"
                                    label="Endereço"
                                    value={formData.endereco}
                                    onChange={handleInputChange}
                                />
                            </Grid>

                            <Grid item xs={12} md={2}>
                                <TextField
                                    fullWidth
                                    id="numero"
                                    label="Número"
                                    value={formData.numero}
                                    onChange={handleInputChange}
                                />
                            </Grid>

                            <Grid item xs={12} md={4}>
                                <TextField
                                    fullWidth
                                    id="bairro"
                                    label="Bairro"
                                    value={formData.bairro}
                                    onChange={handleInputChange}
                                />
                            </Grid>

                            <Grid item xs={12} md={5}>
                                <TextField
                                    fullWidth
                                    id="cidade"
                                    label="Cidade"
                                    value={formData.cidade}
                                    onChange={handleInputChange}
                                />
                            </Grid>

                            <Grid item xs={12} md={3}>
                                <TextField
                                    fullWidth
                                    id="estado"
                                    label="UF"
                                    value={formData.estado}
                                    onChange={handleInputChange}
                                />
                            </Grid>

                            <Grid item xs={12}>
                                <TextField
                                    fullWidth
                                    id="email"
                                    label="E-mail"
                                    type="email"
                                    value={formData.email}
                                    onChange={handleInputChange}
                                    InputProps={{
                                        startAdornment:
                                            <InputAdornment position="start">
                                                <i className="material-icons">
                                                    email
                                                </i>
                                            </InputAdornment>
                                    }}
                                />
                            </Grid>

                            <Grid item xs={12}>
                                <Button
                                    fullWidth
                                    variant="contained"
                                    onClick={salvar}
                                    disabled={loading}
                                    className="btn-pink-gradient"
                                    sx={{
                                        py: 2,
                                        borderRadius: 5,
                                        fontWeight: 700
                                    }}
                                >
                                    {loading
                                        ? <CircularProgress size={22} color="inherit" />
                                        : 'Salvar Cadastro'}
                                </Button>
                            </Grid>

                        </Grid>

                    </Paper>

                    <Dialog
                        open={openModal}
                        onClose={() => setOpenModal(false)}
                        fullWidth
                        maxWidth="lg"
                    >

                        <DialogTitle>
                            Pessoas Cadastradas
                        </DialogTitle>

                        <DialogContent>

                            <TableContainer>

                                <Table>

                                    <TableHead>

                                        <TableRow>
                                            <TableCell>ID</TableCell>
                                            <TableCell>Nome</TableCell>
                                            <TableCell>Documento</TableCell>
                                            <TableCell align="right">
                                                Ações
                                            </TableCell>
                                        </TableRow>

                                    </TableHead>

                                    <TableBody>

                                        {pessoas.map((p) => (

                                            <TableRow key={p.id}>

                                                <TableCell>
                                                    {p.id}
                                                </TableCell>

                                                <TableCell>
                                                    {p.nome_razao_social}
                                                </TableCell>

                                                <TableCell>
                                                    {p.documento}
                                                </TableCell>

                                                <TableCell align="right">

                                                    <IconButton
                                                        onClick={() => editarPessoa(p)}
                                                    >
                                                        <i className="material-icons">
                                                            edit
                                                        </i>
                                                    </IconButton>

                                                    <IconButton
                                                        onClick={() => deletarPessoa(p.id)}
                                                    >
                                                        <i className="material-icons">
                                                            delete
                                                        </i>
                                                    </IconButton>

                                                </TableCell>

                                            </TableRow>

                                        ))}

                                    </TableBody>

                                </Table>

                            </TableContainer>

                        </DialogContent>

                    </Dialog>

                </Box>
            );
        };

        const root = ReactDOM.createRoot(
            document.getElementById('root')
        );

        root.render(<SGPForm />);

    </script>

</body>

</html>
